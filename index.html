<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guess The Number</title>
    <!-- TailwindCSS -->
    <link rel="stylesheet" href="src/output.css" />
    <link
      rel="shortcut icon"
      href="guess-the-number-favicon.png"
      type="image/x-icon"
    />
  </head>
  <body class="bg-secondary text-center">
    <h1
      class="text-black font-instrument-serif text-7xl pt-12 lg:text-9xl lg:pt-20"
    >
      Guess The <span class="text-primary">Number</span>
    </h1>
    <p>I'm thinking of a number between 1-100!</p>

    <!-- Textbox -->
    <div class="pt-26">
      <p>My guess is..</p>
      <div class="flex items-center justify-center gap-3 pt-4">
        <input
          type="number"
          min="0"
          max="100"
          id="guessInput"
          placeholder="67"
          class="bg-white border border-primary border-8 p-2 rounded-2xl text-center font-extrabold"
        />
        <button
          class="bg-primary text-secondary p-4 font-extrabold rounded-2xl"
          id="checkBtn"
        >
          Check!
        </button>
      </div>
      <div class="pt-4">
        <p>Attempts: <span id="attempts">0</span></p>
        <button
          id="resetBtn"
          class="bg-primary text-secondary p-2 font-extrabold rounded-2xl mt-2"
        >
          Play Again
        </button>
      </div>
    </div>

    <!-- Answer -->
    <div class="pt-14">
      <p>And your guess is..</p>
      <h2 class="font-instrument-serif text-7xl text-primary pt-4" id="result">
        ...
      </h2>
      <p id="message"></p>
    </div>

    <footer class="flex justify-center items-center">
      <p class="text-center absolute bottom-2">
        Made with <span class="text-primary">♡</span> by
        <a
          href="https://github.com/queenshafa/"
          class="bg-primary text-white p-0.5"
          >queenshafarania</a
        >
      </p>
    </footer>

    <script src="index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@3.9.1/tsparticles.confetti.bundle.min.js"></script>
  </body>
</html>
